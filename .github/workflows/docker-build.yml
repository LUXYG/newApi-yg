name: Build and Push Docker Image

# 配置触发条件：当有代码推送到 main 分支时自动触发
on:
  push:
    branches:
      - main  # 如果你的默认分支叫 master，请把这里改成 master

jobs:
  build:
    runs-on: ubuntu-latest # 使用 GitHub 官方提供的高配 Linux 环境

    steps:
      # 1. 检出你的代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Docker Buildx (支持更快的缓存和多架构编译)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 登录到 Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. 构建并推送镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 修改为你自己的镜像名称，例如：你的用户名/new-api-custom:latest
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/new-api-custom:latest
          # 开启构建缓存，下一次打包会快很多
          cache-from: type=gha
          cache-to: type=gha,mode=max